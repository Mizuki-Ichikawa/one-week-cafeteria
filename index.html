<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="src\css\home.css">
    </head>
    <body onload="init()">
        <header id="home-header">
            <img id="icon" src="src\images\One-Week_Cafeteria.png">
            <h1>一週間食堂</h1>
        </header>

        <div class="main-layout">
            <div class="table-area">
                
            </div>

            <div class="function-area">
                <div class="sub-area" id="search-area">
                    <header class="sub-header">
                        <img class="icon-images" src="src\images\search-icon.png">
                        <span class="icon-text">キーワードから探す</span><br>
                    </header>
                    <div class="search-form">
                        <input id="text-box" type="text" placeholder="料理名・食材・目的を入力">
                        <button id="search">🔍</button>
                    </div>
                    <span id="search-example">例：ダイエット, 玉ねぎ, 10分でできる</span>
                </div>

                <div class="sub-area" id="menu-area">
                    <div class="sub-header">
                        <img class="icon-images" src="src\images\table-icon.png">
                        <span class="icon-text">献立</span>
                    </div>
                </div>

                <div class="sub-area" id="tags-area">
                    <div class="sub-header">
                        <img class="icon-images" src="src\images\tag-icon.png">
                        <span class="icon-text">人気のタグ</span>
                    </div>
                </div>
                
            </div>
            

        </div> 
        
    </body>
</html>
